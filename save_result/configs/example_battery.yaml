dimensions:
  cathode_material:
    definition: 'Cathode Material: The cathode active materials in secondary batteries store and release electrical energy through the intercalation and de-intercalation of lithium ions. These materials are engineered for various applications, including electric vehicles (EVs), energy storage systems (ESS), and portable IT devices. Their performance is dictated by several factors, such as the chemical composition, crystal structure, nickel content, surface coating, and doping technologies. This field encompasses the comprehensive research and development of cathode materials for lithium-ion batteries. It also includes studies on various compositions and manufacturing techniques aimed at enhancing battery safety and efficiency. Advancements in these technologies are essential for next-generation energy storage solutions like EVs and ESS.'
    node_definition: 'This research presents various compositions and structures for lithium-ion battery cathode active materials, with a particular focus on manufacturing methods involving artificial graphite and metal composites, the utilization of high-nickel cathode materials, and recycling technologies for spent cathode materials through thermal treatment. For instance, reusing recovered active materials by applying heat treatment and adding lithium precursors contributes to the development of sustainable battery technologies. Furthermore, techniques regarding the fabrication of composite cathode materials play a critical role in enhancing the energy density and cycle life of batteries. Such technologies can maximize battery performance by establishing optimal electrode structures and conductive networks.'
  anode_material:
    definition: 'Anode Material: Anode materials are core components in lithium secondary batteries that generate electricity by storing lithium ions and releasing them during discharge; they are critical factors that determine the charging speed, cycle life, and structural stability of the battery. The basic structure of an anode typically consists of a mixture of anode active materials, conductive agents, and binders coated onto a copper substrate. These technologies contribute to increasing the energy density and stability of lithium-ion batteries while improving charging and discharging efficiency. However, certain chemical components or processes regarding anode materials may be excluded; for example, specific eco-friendly materials or unconventional manufacturing methods might not be included.'
    node_definition: 'Related patents cover a variety of technologies for the manufacture and performance enhancement of anode materials. These include, for example, methods for producing anode active materials by mixing lithium compounds with nickel, manganese, and cobalt compounds, as well as technologies for extracting lithium from liquid resources using ion-exchange reactors. In particular, surface modification of anode materials, particle size optimization, and high-temperature precursor manufacturing processes emerge as key technical applications to enhance the performance of lithium-ion batteries. These technologies contribute to increasing the energy density and stability of lithium-ion batteries while improving charging and discharging efficiency.'
  solid_electrolyte:
    definition: 'Solid Electrolyte: Electrolytes that conduct lithium ions in a solid state are the core materials of All-Solid-State Batteries (SSBs). These electrolytes facilitate the movement of ions within a solid lattice or amorphous structure, offering higher stability and safety compared to liquid electrolytes. The efficiency and lifespan of a battery depend on various performance factors of the electrolyte, such as interfacial properties with electrodes, ionic conductivity, and mechanical stability. The primary challenges facing solid-state electrolytes are cost-effectiveness and the feasibility of mass production.'
    node_definition: 'Related patents focus on the composition and structural diversity of solid-state electrolytes, including, for example, new oxide-based solid electrolytes, high-ionic-conductivity polymer electrolytes, and composite solid electrolyte films. In particular, lithium thioborate compositions or lithium nitride-based oxides play a critical role in enhancing lithium-ion conductivity. Furthermore, solid electrolyte systems combined with organic solvents maximize ionic conductivity while ensuring mechanical stability. These technologies contribute to maximizing performance in various application fields associated with the commercialization of all-solid-state batteries.'
  recycling:
    definition: 'Recycling: Recycling is the comprehensive process of recovering valuable metals and materials from end-of-life products—particularly spent batteries and metal scrap—to reuse them or reintegrate them into the production of new products. This process is becoming increasingly important with the proliferation of electric vehicles (EVs) and energy storage systems (ESS), and is broadly divided into pre-treatment, post-treatment, and material remanufacturing stages. These recycling processes contribute significantly to minimizing environmental impact through sustainable resource management and establishing new raw material supply chains, with a focus on promoting the reuse of metals and compounds. Recycling technologies primarily focus on the recovery and recycling of spent batteries and metal scrap, and they differ from conventional waste treatment technologies.'
    node_definition: 'Specifically, in spent battery recycling, technologies that effectively extract precious metals such as lithium, nickel, and cobalt and convert them into new battery materials are essential. For example, as a method for manufacturing cathode active materials for lithium-ion batteries, there is a process of grinding a mixture containing lithium, nickel, manganese, and cobalt compounds. Additionally, technology for extracting lithium from brine involves using an ion-exchange reactor to produce a lithium eluate, which plays a critical role in recovering lithium from spent batteries. These technologies contribute to enhancing quality through impurity removal, the production of high-purity lithium compounds, and recrystallization processes.'
  lithium:
    definition: 'Lithium: Lithium resource extraction and manufacturing is the process of producing lithium compounds from various lithium-bearing sources, including lithium ores (such as spodumene and lepidolite), brines (continental, geothermal, and oilfield brines), and clay-type resources. The primary objective of this process is to convert lithium into compounds such as lithium carbonate (Li₂CO₃), lithium hydroxide (LiOH), lithium chloride (LiCl), and lithium metal to meet the high demand in the electric vehicle and battery industries. Lithium classification encompasses innovations in lithium resource extraction and battery material manufacturing, but it excludes the production of finished lithium-ion batteries or the non-commercial use of lithium resources.'
    node_definition: 'Related patents focus on methods for efficiently extracting lithium through various processes such as physical and chemical sorting, evaporation, leaching, and electrochemical separation. For example, these include methods of mixing organic extractants to extract lithium from brine, the production of lithium eluate solutions using ion-exchange reactors, and lithium hydroxide manufacturing processes through multi-stage filtration systems. Additionally, technologies for crushing mixtures and surface modification to manufacture cathode active materials for lithium secondary batteries are included. Such technologies maximize the purity and efficiency of lithium and contribute to improving productivity through customized processes based on resource characteristics.'