dimensions:
  lithium:
    definition: 'Lithium: Lithium resource extraction and manufacturing is the process of producing lithium compounds from various lithium-bearing sources, including lithium ores (such as spodumene and lepidolite), brines (continental, geothermal, and oilfield brines), and clay-type resources. The primary objective of this process is to convert lithium into compounds such as lithium carbonate (Li₂CO₃), lithium hydroxide (LiOH), lithium chloride (LiCl), and lithium metal to meet the high demand in the electric vehicle and battery industries. Lithium classification encompasses innovations in lithium resource extraction and battery material manufacturing, but it excludes the production of finished lithium-ion batteries or the non-commercial use of lithium resources.'
    node_definition: 'Related patents focus on methods for efficiently extracting lithium through various processes such as physical and chemical sorting, evaporation, leaching, and electrochemical separation. For example, these include methods of mixing organic extractants to extract lithium from brine, the production of lithium eluate solutions using ion-exchange reactors, and lithium hydroxide manufacturing processes through multi-stage filtration systems. Additionally, technologies for crushing mixtures and surface modification to manufacture cathode active materials for lithium secondary batteries are included. Such technologies maximize the purity and efficiency of lithium and contribute to improving productivity through customized processes based on resource characteristics.'
  cathode_material:
    definition: 'Cathode material: A substance that functions as the cathode in secondary batteries, performing the role of storing and releasing electrical energy through the insertion and extraction of lithium ions. Cathode materials are used in various application fields such as electric vehicles, energy storage systems (ESS), and small IT devices, and their performance is determined by several factors including composition, crystallographic structure, nickel content, and coating and doping technologies. This research contributes to the development of various cathode materials aimed at improving the performance and safety of lithium-ion batteries.'
    node_definition: 'Related patents include various technologies for the manufacturing methods and compositions of cathode materials, focusing on the production of cathode active materials using artificial graphite and metal composites. For example, this includes the utilization of high-nickel cathode materials, recycling technologies for spent cathode materials through heat treatment, and manufacturing technologies for composite cathode materials. These technologies contribute to improving the energy density and lifespan of batteries and advancing sustainable battery technology development.'
  anode_material:
    definition: 'Anode materials are essential components in lithium-ion batteries that store lithium ions during charging and release them during discharging, directly influencing the battery''s charging speed, lifespan, and structural stability. Typically, these materials consist of a mixture applied to a copper substrate, which includes active anode substances, conductive agents, and binders. The main goal of this dimension is to enhance the performance and efficiency of lithium-ion batteries through various improvements in anode material composition and structure, excluding any use of specific chemical materials or non-traditional manufacturing methods.'
    node_definition: 'Patents in this dimension cover a range of technologies related to anode material development, including methods for producing anode active substances by mixing lithium compounds with nickel, manganese, and cobalt compounds. They also encompass techniques for extracting lithium from liquid resources using ion exchange reactors and processes for enhancing anode materials such as surface modification, particle size optimization, and precursor manufacturing at high temperatures. Such innovations contribute to increasing the energy density and stability of lithium-ion batteries while improving charging and discharging efficiency.'
  solid_electrolyte:
    definition: 'Solid Electrolyte: A solid electrolyte is a substance that conducts lithium ions in a solid-state environment, playing a crucial role in solid-state batteries (SSBs). Compared to liquid electrolytes, solid electrolytes offer improved stability and safety. Their ionic conductivity, interface properties with electrodes, and mechanical stability directly influence the battery''s efficiency and lifespan. Innovations in solid electrolyte materials include various compositions and structural forms, such as oxide-based solid electrolytes, high ionic conductivity polymer electrolytes, and composite solid electrolyte films. Key compositions like lithium thioborate or lithium nitride-based oxides are significant for enhancing lithium ion conductivity. The integration of solid electrolytes with organic solvents aims to maximize ion conductivity while ensuring mechanical stability, contributing to the performance improvement of SSBs across various application fields.'
    node_definition: 'Related patents explore the diversity and composition of solid electrolytes, focusing on advancements such as novel oxide-based solid electrolytes, the design of high ionic conductivity polymer electrolytes, and composite structures that enhance ionic throughput. Examples include technologies for synthesizing lithium thioborate and lithium nitride-based solid electrolytes, methods for optimizing the interface between solid electrolytes and electrodes, and systems combining solid electrolytes with liquid phases to maximize conductivity while maintaining stability. Addressing cost-effectiveness and scalability in the production of solid electrolytes remains a key area of research within this field.'
  recycling:
    definition: 'Recycling: The recycling process involves the recovery and reuse of valuable metals and materials from end-of-life products, particularly from waste batteries and metal scraps. This comprehensive process is divided into pre-treatment, post-treatment, and material re-manufacturing stages. It is essential for extracting precious metals like lithium, nickel, and cobalt effectively from waste batteries to be processed into new battery materials. The process aims to minimize environmental impact through sustainable resource management and facilitate the reuse of metals and compounds.'
    node_definition: 'Patents related to recycling focus on methods for efficiently extracting valuable materials from waste batteries and metal scraps. This includes technologies for the pre-treatment of waste materials, such as the crushing of mixed compounds containing lithium, nickel, manganese, and cobalt for producing cathode active materials for lithium-ion batteries. Additionally, techniques for extracting lithium from brines using ion-exchange reactors and optimizing the purification processes for high-quality lithium compounds are included. These innovations help in enhancing the overall efficiency and sustainability of the recycling process.'
