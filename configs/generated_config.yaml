dimensions:
  Energy_Efficiency_Improvement_Technologies:
    definition: 'Technologies that reduce carbon emissions by improving thermal efficiency and minimizing energy losses in coke-making and sintering processes. This dimension focuses on heat recovery, combustion optimization, and energy utilization enhancement without fundamentally changing the carbon source or ironmaking route.'
    node_definition: 'Examples include: coke dry quenching (CDQ) for sensible heat recovery and power generation; advanced coke oven sealing to reduce air leakage and heat loss; automated combustion/heating control for coke ovens; recovery and utilization of waste heat from process off-gas; sintering flue gas recirculation (FGR) for fuel reduction; sinter cooler waste heat recovery; combustion zone control-based low-temperature sintering and low-melting compound formation control; precise raw material moisture control to reduce drying energy while maintaining sinter strength; and real-time sensing/data analytics/AI-driven optimization systems that improve energy efficiency and stability in coke/sinter operations (including integrated optimization of coke and sinter processes).'
  Fuel_and_Carbon_Source_Substitution_Technologies:
    definition: 'Technologies that reduce fossil carbon consumption by partially replacing conventional coal- and coke-based carbon sources with low-carbon or renewable alternatives in coke-making, sintering, and blast furnace processes. The conventional blast furnace ironmaking route is maintained.'
    node_definition: 'Examples include: blending or injecting waste plastics and waste rubber as alternative carbon sources in coke-making; applying biochar/biocoke in coke production; partial substitution of fossil fuels with biomass-derived gases; replacing anthracite in sintering with biochar; hybrid heat-source sintering using hydrogen or LNG injection into the upper sinter bed; and using biomass-based carbon sources or auxiliary fuels in blast furnace operation to reduce coke rate and partially substitute fossil carbon inputs while maintaining conventional blast furnace ironmaking.'
  Raw_Material_Structure_Innovation_Technologies:
    definition: 'Technologies that optimize the composition, quality, and charging ratios of blast furnace burden materials to enhance reduction efficiency, permeability, and operational stability while lowering overall carbon intensity.'
    node_definition: 'Examples include blast furnace burden structure optimization technologies such as high pellet operation (e.g., increasing pellet charging ratio to 50% or higher) with measures to control softening–melting behavior changes and permeability deterioration within the blast furnace; strategies to secure stable gas flow and thermal balance under high-pellet burden conditions; expansion of scrap and HBI charging in blast furnace operation, including heat balance compensation using auxiliary heat sources (e.g., plasma) when high-purity scrap causes heat deficits; cold-bonded agglomeration technologies applied to blast furnace burden preparation using binders without heat treatment to reduce energy use; briquetting of iron ore fines and steelmaking by-products for use as blast furnace feedstock substituting sinter or pellets; and replacement of limestone with CaO/MgO (alternative flux materials) to reduce CO₂ emissions from calcination while controlling slag fluidity and furnace chemistry in the blast furnace process.'
  Hydrogen_and_Gas_Transition_Technologies:
    definition: 'Technologies that introduce hydrogen or hydrogen-rich gases into the blast furnace to partially substitute carbon-based reducing agents and enable stepwise decarbonization within the conventional blast furnace framework.'
    node_definition: 'Examples include: blast furnace hydrogen injection enabled by utilizing existing natural gas (NG) injection facilities and/or modifying lances and auxiliary equipment; staged increase of hydrogen concentration with operational safeguards; selection and optimization of hydrogen-rich gases (LNG, COG, NG/H₂ blends) considering reduction rate and thermal balance; real-time monitoring and safety control such as hydrogen leak detection, flashback prevention, thermal imaging analysis for equipment integrity, and integrated control systems to ensure safe fuel transition during hydrogen/hydrogen-rich gas injection.'
  Blast_Furnace_Stabilization_and_High_Efficiency_Operation_Technologies:
    definition: 'Technologies that improve blast furnace operational stability and efficiency under low coke rate or low-carbon operating conditions, including both structural advancements and operational optimization approaches.'
    node_definition: 'Examples include: optimization of reduction gas composition and thermal balance to reduce carbon consumption per ton of hot metal; advanced PCI (higher injection rates, improved coal injection behavior/distribution); application of iron ore–coal composite agglomerates; coke strength/permeability maintenance technologies that secure stable gas channels in the cohesive zone under low coke rate; burden distribution control through precise ore-to-coke (O/C) ratio control, charging pattern optimization, and gas flow homogenization; and next-generation blast furnace system concepts such as oxygen blast furnace operation and carbon circulation blast furnace configurations aimed at structurally lowering carbon intensity.'
